name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform-check:
    name: Terraform check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          VITE_AWS_REGION: eu-central-1
          VITE_COGNITO_DOMAIN: https://example.auth.eu-central-1.amazoncognito.com
          VITE_COGNITO_CLIENT_ID: ci-placeholder-client-id
          VITE_REDIRECT_URI: https://example.cloudfront.net/
          VITE_API_BASE_URL: https://example.execute-api.eu-central-1.amazonaws.com/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  lambda-package:
    name: Lambda package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/matchmaking

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/matchmaking/package-lock.json

      - name: Install Lambda dependencies
        run: npm ci

      - name: Create Lambda zip
        run: |
          mkdir -p ../../artifacts
          zip -r ../../artifacts/matchmaking.zip . -x "matchmaking.zip"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: artifacts/matchmaking.zip

  aws-auth-smoke-test:
    name: AWS auth smoke test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

  terraform-output-smoke-test:
    name: Terraform output smoke test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Terraform init with backend
        run: terraform init -backend-config="backend.hcl"

      - name: Read Terraform outputs
        run: terraform output -json

  deploy-app:
    name: Deploy app
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - terraform-check
      - frontend-build
      - lambda-package
      - aws-auth-smoke-test
      - terraform-output-smoke-test

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: artifacts

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Terraform init with backend
        working-directory: infra/terraform
        run: terraform init -backend-config="backend.hcl"

      - name: Export Terraform outputs
        working-directory: infra/terraform
        run: |
          echo "AWS_REGION=$(terraform output -raw aws_region)" >> $GITHUB_ENV
          echo "API_BASE_URL=$(terraform output -raw api_gateway_endpoint)" >> $GITHUB_ENV
          echo "COGNITO_DOMAIN=$(terraform output -raw cognito_hosted_ui_base_url)" >> $GITHUB_ENV
          echo "COGNITO_CLIENT_ID=$(terraform output -raw cognito_user_pool_client_id)" >> $GITHUB_ENV
          echo "FRONTEND_BUCKET_NAME=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw frontend_cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DOMAIN_NAME=$(terraform output -raw frontend_cloudfront_domain_name)" >> $GITHUB_ENV
          echo "MATCHMAKING_LAMBDA_NAME=$(terraform output -raw matchmaking_lambda_name)" >> $GITHUB_ENV
          echo "VITE_REDIRECT_URI=https://$(terraform output -raw frontend_cloudfront_domain_name)/" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for deploy
        working-directory: frontend
        run: npm run build
        env:
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
          VITE_COGNITO_DOMAIN: ${{ env.COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ env.COGNITO_CLIENT_ID }}
          VITE_REDIRECT_URI: ${{ env.VITE_REDIRECT_URI }}
          VITE_API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$MATCHMAKING_LAMBDA_NAME" \
            --zip-file "fileb://artifacts/matchmaking.zip"

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ "s3://$FRONTEND_BUCKET_NAME" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
